name: CI

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    name: Build PR artifact
    runs-on: ubuntu-latest
    needs: test
    # Only build the tarball for PRs (not plain feature branch pushes)
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pack
        run: npm pack

      - name: Upload PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebridge-ups-monitor-pr${{ github.event.pull_request.number }}
          path: homebridge-ups-monitor-*.tgz
          retention-days: 7
