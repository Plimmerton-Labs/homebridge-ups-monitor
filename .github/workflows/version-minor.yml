name: Bump Minor Version

# Runs when a PR (typically develop → main) is merged into main.
# Increments the MINOR number and resets PATCH to 0 (e.g. 1.0.3 → 1.1.0),
# commits back to main, then merges main back into develop so the next
# feature cycle starts from the correct baseline.
# The release.yml workflow then picks up the version-bump commit and
# builds the stable release artifact.

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  bump-minor:
    name: Bump MINOR version
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0          # need full history for the develop merge
          token: ${{ secrets.PAT_VERSION_BUMP || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump MINOR in package.json (reset PATCH to 0)
        id: bump
        run: |
          node - <<'EOF'
          const fs  = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor] = pkg.version.split('.').map(Number);
          pkg.version = `${major}.${minor + 1}.0`;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`Bumped to ${pkg.version}`);
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `new_version=${pkg.version}\n`);
          EOF

      - name: Commit and push to main
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin main

      # Sync the new baseline version back to develop so the next feature
      # cycle increments from the correct minor (e.g. 1.1.0 → 1.1.1, not 1.0.4).
      - name: Merge main back into develop
        run: |
          git checkout develop
          git pull origin develop
          git merge main --no-ff -m "chore: sync version ${{ steps.bump.outputs.new_version }} from main"
          git push origin develop
