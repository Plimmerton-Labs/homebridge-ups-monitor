name: Bump Minor Version

# Runs when a PR (typically develop → main) is merged into main,
# but NOT when a version-bump or sync-main PR merges (those are automated).
#
# Instead of pushing directly to main (blocked by branch protection),
# this workflow:
#   1. Creates a chore/version-bump-X.Y.0 branch from main with the bumped package.json
#   2. Opens a PR targeting main
#   3. Enables auto-merge — the PR merges itself once CI passes
#
# After that PR lands on main, sync-develop.yml fires and opens a follow-up
# PR to carry the new version back into develop.

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  bump-minor:
    name: Bump MINOR version
    if: |
      github.event.pull_request.merged == true &&
      !startsWith(github.head_ref, 'chore/version-bump') &&
      !startsWith(github.head_ref, 'chore/sync-main')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump MINOR in package.json (reset PATCH to 0)
        id: bump
        run: |
          node - <<'EOF'
          const fs  = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor] = pkg.version.split('.').map(Number);
          pkg.version = `${major}.${minor + 1}.0`;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`Bumped to ${pkg.version}`);
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `new_version=${pkg.version}\n`);
          EOF

      - name: Open version-bump PR to main
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_VERSION_BUMP }}
          commit-message: "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          branch: chore/version-bump-${{ steps.bump.outputs.new_version }}
          base: main
          title: "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          body: |
            Automated MINOR version bump triggered by merge of #${{ github.event.pull_request.number }}.

            This PR will auto-merge once CI passes. After it lands, sync-develop.yml
            will open a follow-up PR to carry the new version back to develop.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          # Must use PAT, not GITHUB_TOKEN — merges via GITHUB_TOKEN do not
          # trigger downstream push-event workflows (e.g. release.yml).
          GH_TOKEN: ${{ secrets.PAT_VERSION_BUMP }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --auto --squash --repo ${{ github.repository }}
