name: Dependency Audit

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly-disclosed CVEs
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity)
        # Fails the job only for HIGH or CRITICAL severity vulnerabilities.
        # Moderate and low findings are logged but do not block merges.
        run: npm audit --audit-level=high --omit=dev
