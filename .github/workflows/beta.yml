name: Beta

on:
  push:
    branches:
      - develop
      - agent/debug-oidc-publish

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.head_commit.message, 'chore: bump version') ||
      github.ref == 'refs/heads/agent/debug-oidc-publish'

    permissions:
      contents: write
      id-token: write
      pull-requests: write   # needed to post PR comment

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Diagnose and publish
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Capture all diagnostic info
          {
            echo "## npmrc state"
            echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG:-not set}"
            echo "---project .npmrc---"
            cat .npmrc 2>/dev/null || echo "(not found)"
            echo "---userconfig file---"
            cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null || echo "(not found)"
            echo "---npm config ls---"
            npm config ls 2>&1
            echo "---NODE_AUTH_TOKEN length: ${#NODE_AUTH_TOKEN}---"
            echo "---OIDC: ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+YES (${#ACTIONS_ID_TOKEN_REQUEST_URL} chars)}---"
            echo "---npm version: $(npm --version)---"
            echo ""
            echo "## npm publish output"
            npm publish --access public --tag beta --provenance 2>&1 || true
          } > /tmp/diag.txt

          cat /tmp/diag.txt

          # Post as PR comment
          BODY=$(python3 -c "
import json, sys
txt = open('/tmp/diag.txt').read()[:4000]
print(json.dumps({'body': '\`\`\`\n' + txt + '\n\`\`\`'}))
")
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/GodIsI/homebridge-ups-monitor/issues/46/comments" \
            -d "$BODY" > /dev/null
