name: Beta

on:
  push:
    branches: [ develop ]

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    # Only build when the version has been bumped — not on every push to develop.
    # The version-patch.yml workflow commits "chore: bump version to X.Y.Z" which
    # is what triggers a real beta artifact build.
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Publish to npm with beta tag
        # Skipped if NPM_TOKEN is not yet configured — add it in
        # repo Settings → Secrets → Actions once you have an npm account.
        if: env.HAS_NPM_TOKEN == 'true'
        run: npm publish --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
