name: Beta

on:
  push:
    branches:
      - develop
      - agent/debug-oidc-publish

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.head_commit.message, 'chore: bump version') ||
      github.ref == 'refs/heads/agent/debug-oidc-publish'

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Capture npm config to job summary
        run: |
          {
            echo "## npm config debug"
            echo "### NPM_CONFIG_USERCONFIG"
            echo '```'
            echo "${NPM_CONFIG_USERCONFIG:-not set}"
            echo '```'

            echo "### Project .npmrc"
            echo '```'
            cat .npmrc 2>/dev/null || echo "(not found)"
            echo '```'

            echo "### NPM_CONFIG_USERCONFIG file"
            echo '```'
            cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null || echo "(not found)"
            echo '```'

            echo "### ~/.npmrc"
            echo '```'
            cat ~/.npmrc 2>/dev/null || echo "(not found)"
            echo '```'

            echo "### npm config ls (auth)"
            echo '```'
            npm config ls -l 2>/dev/null | grep -i "authToken\|token\|_auth\|registry" | head -20 || echo "(none)"
            echo '```'

            echo "### NODE_AUTH_TOKEN length"
            echo "${#NODE_AUTH_TOKEN}"

            echo "### OIDC"
            echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+YES}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove ALL auth tokens for OIDC
        run: |
          # Clean project .npmrc
          [ -f .npmrc ] && sed -i '/authToken/d' .npmrc || true
          # Clean NPM_CONFIG_USERCONFIG
          [ -n "$NPM_CONFIG_USERCONFIG" ] && sed -i '/authToken/d' "$NPM_CONFIG_USERCONFIG" || true
          # Clean ~/.npmrc
          sed -i '/authToken/d' ~/.npmrc 2>/dev/null || true
          # Belt-and-suspenders
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true

      - name: Capture post-cleanup state to summary
        run: |
          {
            echo "## After cleanup"
            echo "### Project .npmrc"
            echo '```'
            cat .npmrc 2>/dev/null || echo "(not found)"
            echo '```'
            echo "### NPM_CONFIG_USERCONFIG file"
            echo '```'
            cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null || echo "(not found)"
            echo '```'
            echo "### npm config get authToken"
            echo '```'
            npm config get //registry.npmjs.org/:_authToken 2>&1 || echo "(error)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Capture publish error to summary
        if: always()
        run: |
          {
            echo "## Publish attempt"
            echo "### npm publish output"
            echo '```'
            npm publish --access public --tag beta --provenance 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
