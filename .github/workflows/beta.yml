name: Beta

on:
  push:
    branches: [ develop ]

jobs:
  beta:
    name: Beta Release
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write
      id-token: write   # Required for npm OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create beta GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          name: v${{ steps.pkg.outputs.version }}-beta.${{ github.run_number }}
          files: homebridge-ups-monitor-*.tgz
          generate_release_notes: true
          prerelease: true
          make_latest: false

      - name: Publish to npm with beta tag
        # npm OIDC Trusted Publishing — no NPM_TOKEN required.
        # Trusted Publisher: npmjs.com/package/homebridge-ups-monitor → Settings
        # GitHub owner: GodIsI, repo: homebridge-ups-monitor, workflow: beta.yml
        run: npm publish --access public --tag beta --provenance
