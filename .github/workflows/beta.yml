name: Beta

on:
  push:
    branches: [ develop ]

jobs:
  beta:
    name: Beta GitHub Release
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Derive the prerelease version deterministically from the commit count so
      # the GitHub tag matches the npm beta version published by publish.yml
      # (both compute `git rev-list --count HEAD` on the same commit).
      - name: Compute beta version
        id: pkg
        run: |
          BASE=$(node -p "require('./package.json').version")
          BETA=$(git rev-list --count HEAD)
          echo "version=${BASE}-beta.${BETA}" >> "$GITHUB_OUTPUT"

      - name: Stamp package version for pack
        run: npm version "${{ steps.pkg.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Extract release notes from CHANGELOG
        run: |
          awk '
            /^## / {
              if (found) exit
              found = 1
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for this release." > release-notes.md
          fi

      - name: Pack
        run: npm pack

      - name: Create beta GitHub pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          files: homebridge-ups-monitor-*.tgz
          body_path: release-notes.md
          prerelease: true
          make_latest: false

      # npm publish is handled by publish.yml (single Trusted Publisher entry)
