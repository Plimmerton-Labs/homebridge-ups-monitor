name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    name: Stable GitHub Release
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pack
        run: npm pack

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        run: |
          awk '
            /^## / {
              if (found) exit
              found = 1
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for this release." > release-notes.md
          fi

      - name: Create stable GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          files: homebridge-ups-monitor-*.tgz
          body_path: release-notes.md
          make_latest: true

      # npm publish is handled by publish.yml (single Trusted Publisher entry)
