name: Bump Patch Version

# Runs when a PR is merged into develop (but NOT a version-bump, sync-main, or
# main PR — those are automated/sync merges and must not trigger another bump,
# or we'd loop forever).
#
# Excluded head branches:
#   chore/version-bump-* — automated patch-bump loop prevention
#   chore/sync-main-*    — automated minor-version sync from main
#   main                 — manual main->develop sync (use sync-develop.yml instead)
#
# Instead of pushing directly to develop (blocked by branch protection),
# this workflow:
#   1. Creates a chore/version-bump-X.X.X branch with the bumped package.json
#   2. Opens a PR targeting develop
#   3. Enables auto-merge — the PR merges itself once CI passes
#
# The "chore: bump version to X.X.X" squash-commit that lands on develop
# then triggers beta.yml, which builds the pre-release artifact.
#
# Auth: uses the Plimmerton Labs AI Agents GitHub App (not GITHUB_TOKEN, which
# cannot trigger downstream workflows on merge).

on:
  pull_request:
    branches: [ develop ]
    types: [ closed ]

jobs:
  bump-patch:
    name: Bump PATCH version
    if: |
      github.event.pull_request.merged == true &&
      !startsWith(github.head_ref, 'chore/version-bump') &&
      !startsWith(github.head_ref, 'chore/sync-main') &&
      github.head_ref != 'main'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v7
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name  "Plimmerton Labs AI Agents"
          git config user.email "296834291+plimmerton-labs-ai-agents[bot]@users.noreply.github.com"

      - name: Bump PATCH in package.json
        id: bump
        run: |
          node - <<'EOF'
          const fs  = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor, patch] = pkg.version.split('.').map(Number);
          pkg.version = `${major}.${minor}.${patch + 1}`;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`Bumped to ${pkg.version}`);
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `new_version=${pkg.version}\n`);
          EOF

      - name: Regenerate CHANGELOG from commits
        run: npx --yes conventional-changelog-cli@5 -p conventionalcommits -r 0 -o CHANGELOG.md

      - name: Open version-bump PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          branch: chore/version-bump-${{ steps.bump.outputs.new_version }}
          base: develop
          title: "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          body: |
            Automated PATCH version bump triggered by merge of #${{ github.event.pull_request.number }}.

            This PR will auto-merge once CI passes.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --auto --squash --repo ${{ github.repository }}
