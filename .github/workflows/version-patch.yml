name: Bump Patch Version

# Runs when a PR is merged into develop.
# Increments the PATCH number in package.json (e.g. 1.0.2 → 1.0.3),
# commits the change back to develop, then the beta.yml workflow picks
# it up and builds the pre-release artifact with the new version.

on:
  pull_request:
    branches: [ develop ]
    types: [ closed ]

jobs:
  bump-patch:
    name: Bump PATCH version
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          # PAT_VERSION_BUMP is a fine-grained PAT with Contents:Write on this
          # repo. It is owned by a repo admin so it bypasses branch rulesets.
          # Falls back to GITHUB_TOKEN if the secret is not set (unprotected repos).
          token: ${{ secrets.PAT_VERSION_BUMP || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump PATCH in package.json
        id: bump
        run: |
          node - <<'EOF'
          const fs  = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const [major, minor, patch] = pkg.version.split('.').map(Number);
          pkg.version = `${major}.${minor}.${patch + 1}`;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log(`Bumped to ${pkg.version}`);
          // Export for later steps
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `new_version=${pkg.version}\n`);
          EOF

      - name: Commit and push
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin develop
