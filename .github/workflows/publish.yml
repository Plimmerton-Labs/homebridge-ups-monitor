name: Publish

# Single workflow for ALL npm publishing — keeps the Trusted Publisher on npmjs.com
# to one entry. Update this file for any npm publish changes; beta.yml and release.yml
# handle only the GitHub release artefacts.
#
# Trusted Publisher (npmjs.com → homebridge-ups-monitor → Settings):
#   GitHub owner: GodIsI  repo: homebridge-ups-monitor  workflow: publish.yml

on:
  push:
    branches:
      - develop   # publishes with --tag beta (version X.Y.Z-beta.N)
      - main      # publishes with --tag latest

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      id-token: write   # Required for npm OIDC Trusted Publishing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'   # Node 24 ships npm 11, required for OIDC Trusted Publishing
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Use the newest npm CLI for publishing. Node 24 ships npm 11 (required for
      # OIDC Trusted Publishing); upgrading to the latest npm keeps OIDC working
      # AND ensures the package README is attached to the registry manifest so the
      # npmjs page / Socket render it (the registry 'readme' field was empty —
      # see Socket "README file is missing").
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Develop builds publish as a proper prerelease version so the npm version
      # matches the GitHub pre-release tag created by beta.yml (vX.Y.Z-beta.N),
      # letting the Homebridge UI resolve release notes for installed betas.
      - name: Stamp beta prerelease version (develop only)
        if: github.ref == 'refs/heads/develop'
        run: |
          BASE=$(node -p "require('./package.json').version")
          BETA=$(git rev-list --count HEAD)
          npm version "${BASE}-beta.${BETA}" --no-git-tag-version --allow-same-version
          echo "Publishing beta ${BASE}-beta.${BETA}"

      - name: Publish beta (develop → npm beta tag)
        if: github.ref == 'refs/heads/develop'
        run: npm publish --access public --tag beta

      - name: Publish stable (main → npm latest tag)
        if: github.ref == 'refs/heads/main'
        run: npm publish --access public
