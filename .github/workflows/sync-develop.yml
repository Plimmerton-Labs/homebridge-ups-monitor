name: Sync Main to Develop

# Runs after a chore/version-bump-* PR is merged into main.
# Checks out develop, creates a sync branch, cherry-picks the version
# files from main, then opens an auto-merge PR to develop.
#
# Fixed: the old create-pull-request approach made no local changes
# (the workflow checked out main but didn't edit anything), so it
# silently no-op'd. Now we explicitly checkout develop, apply main's
# package.json/lock, commit, push, then open the PR via gh CLI.

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  sync-develop:
    name: Sync version back to develop
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'chore/version-bump')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.PAT_VERSION_BUMP }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch main and read version
        id: version
        run: |
          git fetch origin main
          VERSION=$(git show origin/main:package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and apply version from main
        id: branch
        run: |
          SYNC_BRANCH="chore/sync-main-${{ steps.version.outputs.version }}"
          git checkout -b "$SYNC_BRANCH"

          # Apply package.json and package-lock.json from main
          git checkout origin/main -- package.json package-lock.json

          if git diff --staged --quiet; then
            echo "Nothing to sync — develop already at ${{ steps.version.outputs.version }}"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync version ${{ steps.version.outputs.version }} from main"
            git push origin "$SYNC_BRANCH"
            echo "name=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open sync PR to develop
        if: steps.branch.outputs.created == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT_VERSION_BUMP }}
        run: |
          PR_URL=$(gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.name }}" \
            --title "chore: sync version ${{ steps.version.outputs.version }} from main" \
            --body "Automated sync of version ${{ steps.version.outputs.version }} from main back to develop.")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_VERSION_BUMP }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" \
            --auto --squash --repo ${{ github.repository }}
