name: Sync Main to Develop

# Runs after a chore/version-bump-* PR is merged into main (i.e., after
# version-minor.yml's auto-merge PR lands).
#
# Opens an auto-merge PR from a chore/sync-main-X.Y.0 branch into develop,
# carrying the new MINOR version number back so the next patch cycle starts
# from the correct baseline (e.g. 1.1.0 → 1.1.1, not 1.0.4).
#
# The sync PR merge does NOT trigger version-patch.yml because its head
# branch starts with 'chore/sync-main', which is excluded in that workflow.

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  sync-develop:
    name: Sync version back to develop
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'chore/version-bump')

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Open sync PR to develop
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_VERSION_BUMP }}
          commit-message: "chore: sync version ${{ steps.version.outputs.version }} from main"
          branch: chore/sync-main-${{ steps.version.outputs.version }}
          base: develop
          title: "chore: sync version ${{ steps.version.outputs.version }} from main"
          body: |
            Automated sync of version ${{ steps.version.outputs.version }} from main back to develop.

            This PR will auto-merge once CI passes.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --auto --squash --repo ${{ github.repository }}
