<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="UPS Monitor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1d27"/>
      <stop offset="1" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- battery body -->
  <rect x="116" y="150" width="250" height="212" rx="30" fill="none" stroke="#e2e8f0" stroke-width="22"/>
  <!-- battery terminal -->
  <rect x="372" y="206" width="34" height="100" rx="14" fill="#e2e8f0"/>
  <!-- lightning bolt -->
  <path d="M262 178 L196 280 L242 280 L226 334 L300 226 L252 226 Z" fill="url(#bolt)" stroke="url(#bolt)" stroke-width="10" stroke-linejoin="round"/>
</svg>
