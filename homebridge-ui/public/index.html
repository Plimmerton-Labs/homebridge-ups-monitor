<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUT UPS Monitor — Settings</title>
  <style>
    .ups-link-card {
      margin: 0 0 18px; padding: 14px 16px; border-radius: 8px;
      border: 1px solid var(--bs-border-color, #ced4da);
      background: var(--bs-tertiary-bg, #f8f9fa);
      font-size: 14px; line-height: 1.5;
    }
    .ups-link-card.disabled { opacity: 0.75; }
    .ups-link-title { font-weight: 600; margin-bottom: 6px; }
    .ups-link-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ups-link-row a { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    .ups-copy-btn {
      border: 1px solid var(--bs-border-color, #ced4da); background: transparent;
      color: inherit; border-radius: 6px; padding: 2px 10px; font-size: 12px; cursor: pointer;
    }
    .ups-copy-btn:hover { background: var(--bs-secondary-bg, #e9ecef); }
    .ups-hint { color: var(--bs-secondary-color, #6c757d); font-size: 12.5px; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="ups-link" class="ups-link-card" style="display:none;"></div>

  <script>
    (async () => {
      // With customUi, Homebridge renders OUR page — so we must render the
      // standard schema-based config form ourselves first. Do this no matter
      // what, so the settings form always appears even if the link logic fails.
      try { homebridge.showSchemaForm(); } catch (e) { /* older UI */ }

      const card = document.getElementById('ups-link');

      const escapeHtml = (s) => String(s).replace(/[&<>"]/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

      let lastPort;

      async function refresh() {
        let port;
        try {
          const configs = await homebridge.getPluginConfig();
          const cfg = (configs && configs[0]) || {};
          port = cfg.standalonePort;
        } catch (e) { return; }

        // Avoid needless re-renders
        if (port === lastPort) return;
        lastPort = port;

        if (!port) {
          card.style.display = 'none';
          card.classList.add('disabled');
          card.innerHTML = '';
          return;
        }

        const p = escapeHtml(port);
        const url = `http://homebridge.local:${p}`;
        card.style.display = 'block';
        card.classList.remove('disabled');
        card.innerHTML =
          '<div class="ups-link-title">📊 Standalone dashboard</div>' +
          '<div class="ups-link-row">' +
            'Open at <a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>' +
            '<button type="button" class="ups-copy-btn" id="ups-copy">Copy</button>' +
          '</div>' +
          '<div class="ups-hint">Also reachable at <code>http://localhost:' + p +
          '</code> or <code>http://&lt;pi-ip&gt;:' + p + '</code>. ' +
          'Save changes and restart Homebridge to apply a new port.</div>';

        const btn = document.getElementById('ups-copy');
        if (btn) btn.addEventListener('click', () => {
          navigator.clipboard && navigator.clipboard.writeText(url);
          btn.textContent = 'Copied';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
        });
      }

      await refresh();

      // React to edits in the schema form, with a light polling fallback in
      // case the event isn't delivered for in-progress (unsaved) edits.
      try { homebridge.addEventListener('configChanged', refresh); } catch (e) { /* ignore */ }
      setInterval(refresh, 1500);
    })();
  </script>
</body>
</html>
